<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}MealRunner{% endblock %}</title>
  <script src="https://unpkg.com/htmx.org@2.0.4"></script>
  <script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.6/Sortable.min.js"></script>
  <style>
    :root {
      --bg: #1a1a2e;
      --surface: #16213e;
      --surface2: #0f3460;
      --accent: #e94560;
      --text: #eee;
      --dim: #888;
      --green: #4ade80;
      --yellow: #fbbf24;
      --red: #f87171;
      --radius: 10px;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100dvh;
      padding-bottom: 72px;
    }
    header {
      background: var(--surface);
      padding: 12px 16px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      border-bottom: 1px solid var(--surface2);
    }
    header h1 {
      font-size: 1.2rem;
      font-weight: 600;
    }
    header .week {
      color: var(--dim);
      font-size: 0.85rem;
    }
    main {
      padding: 16px;
      max-width: 600px;
      margin: 0 auto;
    }

    /* Bottom navigation */
    nav.bottom {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      background: var(--surface);
      border-top: 1px solid var(--surface2);
      display: flex;
      justify-content: space-around;
      padding: 8px 0 calc(8px + env(safe-area-inset-bottom));
      z-index: 100;
    }
    nav.bottom a {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 2px;
      text-decoration: none;
      color: var(--dim);
      font-size: 0.7rem;
      padding: 4px 12px;
      border-radius: 8px;
      transition: color 0.15s;
    }
    nav.bottom a.active {
      color: var(--accent);
    }
    nav.bottom a .icon {
      font-size: 1.4rem;
      line-height: 1;
    }

    /* Cards */
    .card {
      background: var(--surface);
      border-radius: var(--radius);
      padding: 16px;
      margin-bottom: 12px;
    }
    .card h2 {
      font-size: 1rem;
      margin-bottom: 8px;
      color: var(--accent);
    }

    /* Status pills */
    .status-bar {
      display: flex;
      gap: 8px;
      overflow-x: auto;
      padding: 4px 0;
      margin-bottom: 16px;
    }
    .pill {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      padding: 4px 10px;
      border-radius: 20px;
      font-size: 0.75rem;
      white-space: nowrap;
      background: var(--surface2);
      color: var(--dim);
    }
    .pill.done {
      background: rgba(74, 222, 128, 0.15);
      color: var(--green);
    }
    .pill.current {
      background: rgba(233, 69, 96, 0.15);
      color: var(--accent);
    }

    /* Plan table */
    .plan-row {
      display: flex;
      align-items: center;
      padding: 10px 0;
      border-bottom: 1px solid var(--surface2);
      gap: 8px;
    }
    .plan-row:last-child { border-bottom: none; }
    .plan-row-ghost {
      opacity: 0.3;
      background: var(--surface2);
      border-radius: var(--radius);
    }
    .drag-handle {
      color: var(--dim);
      font-size: 1rem;
      cursor: grab;
      padding: 4px;
      flex-shrink: 0;
      touch-action: none;
    }
    .plan-day {
      font-size: 0.75rem;
      color: var(--dim);
      width: 28px;
      flex-shrink: 0;
      text-transform: uppercase;
    }
    .plan-meal {
      flex: 1;
      font-size: 0.95rem;
      position: relative;
      overflow: hidden;
    }
    .plan-side {
      color: var(--dim);
      font-size: 0.8rem;
    }
    .plan-actions {
      display: flex;
      gap: 4px;
      flex-shrink: 0;
    }

    /* Swipe to replace */
    .swipe-container {
      position: relative;
      overflow: hidden;
    }
    .swipe-content {
      position: relative;
      z-index: 1;
      background: var(--surface);
    }
    .swipe-action {
      position: absolute;
      right: 0;
      top: 0;
      bottom: 0;
      display: flex;
      align-items: center;
      padding: 0 12px;
      background: var(--accent);
      color: white;
      font-size: 0.8rem;
      font-weight: 500;
      opacity: 0;
      border-radius: 4px;
    }

    /* Candidates panel */
    .candidates-panel {
      background: var(--surface);
      border: 1px solid var(--surface2);
      border-radius: var(--radius);
      margin-top: 12px;
      max-height: 60vh;
      overflow-y: auto;
    }
    .candidates-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 12px 14px;
      border-bottom: 1px solid var(--surface2);
      font-weight: 600;
      font-size: 0.9rem;
      position: sticky;
      top: 0;
      background: var(--surface);
    }
    .candidates-section {
      padding: 4px 0;
    }
    .candidates-label {
      padding: 8px 14px 4px;
      font-size: 0.7rem;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: var(--dim);
    }
    .candidate-option {
      display: flex;
      flex-direction: column;
      width: 100%;
      padding: 10px 14px;
      border: none;
      background: none;
      color: var(--text);
      text-align: left;
      cursor: pointer;
      font-size: 0.9rem;
      border-bottom: 1px solid rgba(255,255,255,0.04);
    }
    .candidate-option:active {
      background: var(--surface2);
    }
    .candidate-meta {
      font-size: 0.75rem;
      color: var(--dim);
      margin-top: 2px;
    }

    /* Grocery list */
    .grocery-group {
      margin-bottom: 16px;
    }
    .grocery-controls {
      display: flex;
      justify-content: flex-end;
      margin-bottom: 8px;
      padding: 0 4px;
    }
    .grocery-group-header {
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 6px;
      user-select: none;
    }
    .group-toggle {
      font-size: 0.6rem;
      color: var(--dim);
    }
    .group-count {
      font-size: 0.7rem;
      color: var(--dim);
      font-weight: normal;
      margin-left: auto;
    }
    .grocery-group h3 {
      font-size: 0.8rem;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: var(--accent);
      padding: 6px 0;
      border-bottom: 1px solid var(--surface2);
      margin-bottom: 4px;
    }
    .grocery-item {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 10px 4px;
      border-bottom: 1px solid rgba(255,255,255,0.04);
      cursor: pointer;
      user-select: none;
      -webkit-tap-highlight-color: transparent;
      transition: opacity 0.2s;
    }
    .grocery-item:active {
      opacity: 0.6;
    }
    .grocery-item.checked .name {
      text-decoration: line-through;
      color: var(--dim);
    }
    .grocery-item .check {
      font-size: 1.1rem;
      width: 24px;
      text-align: center;
      flex-shrink: 0;
    }
    .grocery-item.checked .check {
      color: var(--green);
    }
    .grocery-item .name { flex: 1; }
    .grocery-item .for-text {
      color: var(--dim);
      font-size: 0.8rem;
    }
    .grocery-item.multi-meal {
      border-left: 3px solid var(--yellow);
      padding-left: 8px;
    }
    .multi-badge {
      display: inline-block;
      background: var(--yellow);
      color: var(--bg);
      font-size: 0.65rem;
      font-weight: 700;
      padding: 1px 5px;
      border-radius: 8px;
      vertical-align: middle;
      margin-left: 4px;
    }

    /* Buttons */
    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      padding: 6px 12px;
      border-radius: 6px;
      border: none;
      font-size: 0.8rem;
      cursor: pointer;
      transition: opacity 0.15s;
      color: var(--text);
      background: var(--surface2);
    }
    .btn:hover { opacity: 0.8; }
    .btn.primary {
      background: var(--accent);
      color: white;
    }
    .btn.sm {
      padding: 4px 8px;
      font-size: 0.75rem;
    }

    /* HTMX loading indicator */
    .htmx-indicator {
      opacity: 0;
      transition: opacity 0.2s;
    }
    .htmx-request .htmx-indicator {
      opacity: 1;
    }

    /* Product history panel */
    .product-history {
      background: var(--surface);
      border: 1px solid var(--surface2);
      border-radius: var(--radius);
      margin-bottom: 16px;
    }
    .product-history-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 12px 14px;
      border-bottom: 1px solid var(--surface2);
      font-weight: 600;
      font-size: 0.9rem;
    }
    .product-row {
      display: flex;
      align-items: center;
      padding: 10px 14px;
      border-bottom: 1px solid rgba(255,255,255,0.04);
      gap: 10px;
    }
    .product-row:last-child { border-bottom: none; }
    .product-info { flex: 1; }
    .product-desc { font-size: 0.9rem; }
    .product-meta {
      font-size: 0.75rem;
      color: var(--dim);
      margin-top: 2px;
    }
    .product-rating {
      display: flex;
      gap: 6px;
      flex-shrink: 0;
    }
    .rate-btn {
      background: none;
      border: 1px solid var(--surface2);
      border-radius: 6px;
      padding: 4px 8px;
      font-size: 1.1rem;
      cursor: pointer;
      opacity: 0.5;
      transition: opacity 0.15s;
    }
    .rate-btn:active { opacity: 1; }
    .rate-btn.active-up {
      opacity: 1;
      border-color: var(--green);
      background: rgba(74, 222, 128, 0.1);
    }
    .rate-btn.active-down {
      opacity: 1;
      border-color: var(--red);
      background: rgba(248, 113, 113, 0.1);
    }

    /* Plan cards (landing page) */
    .plan-card {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 14px 12px;
      border-bottom: 1px solid var(--surface2);
      text-decoration: none;
      color: var(--text);
      transition: background 0.15s;
    }
    .plan-card:active {
      background: var(--surface2);
    }
    .plan-card:last-child { border-bottom: none; }
    .plan-card-week {
      font-size: 1rem;
      font-weight: 500;
    }

    /* Grocery toggle on plan rows */
    .grocery-toggle {
      font-size: 1rem;
      cursor: pointer;
      opacity: 0.25;
      transition: opacity 0.15s;
      padding: 4px;
      -webkit-tap-highlight-color: transparent;
    }
    .grocery-toggle:active { opacity: 0.5; }
    .grocery-toggle.on {
      opacity: 1;
    }

    /* Add meal row */
    .plan-row-empty {
      opacity: 0.6;
    }
    .plan-add-btn {
      cursor: pointer;
      padding: 4px 0;
    }
    .plan-add-btn:active {
      opacity: 0.6;
    }

    /* Grocery add form */
    .grocery-add-form {
      position: sticky;
      bottom: 72px;
      background: var(--surface);
      border-top: 1px solid var(--surface2);
      padding: 10px 12px;
      border-radius: var(--radius) var(--radius) 0 0;
      margin-top: 12px;
    }
    .grocery-add-form form {
      display: flex;
      gap: 8px;
    }
    .grocery-add-input {
      flex: 1;
      padding: 8px 12px;
      border-radius: 6px;
      border: 1px solid var(--surface2);
      background: var(--bg);
      color: var(--text);
      font-size: 0.9rem;
      outline: none;
    }
    .grocery-add-input:focus {
      border-color: var(--accent);
    }

    /* Empty state */
    .empty {
      text-align: center;
      padding: 40px 20px;
      color: var(--dim);
    }
    .empty .icon { font-size: 2rem; margin-bottom: 8px; }
  </style>
</head>
<body>
  <header>
    <a href="/plan" style="text-decoration:none; color:var(--text);"><h1>MealRunner</h1></a>
    {% if date_label %}
    <span class="week">{{ date_label }}</span>
    {% endif %}
  </header>

  <main>
    {% block content %}{% endblock %}
  </main>

  <nav class="bottom">
    <a href="/plan" class="{% if active == 'plan' %}active{% endif %}">
      <span class="icon">&#x1F4CB;</span>
      <span>Plan</span>
    </a>
    <a href="/grocery" class="{% if active == 'grocery' %}active{% endif %}">
      <span class="icon">&#x1F6D2;</span>
      <span>Grocery</span>
    </a>
    <a href="/order" class="{% if active == 'order' %}active{% endif %}">
      <span class="icon">&#x1F4E6;</span>
      <span>Order</span>
    </a>
    <a href="/reconcile" class="{% if active == 'reconcile' %}active{% endif %}">
      <span class="icon">&#x1F9FE;</span>
      <span>Receipt</span>
    </a>
  </nav>
  <script>
    // Re-run inline scripts after HTMX swaps in new content
    document.body.addEventListener('htmx:afterSwap', function(e) {
      var scripts = e.detail.elt.querySelectorAll('script');
      scripts.forEach(function(oldScript) {
        var newScript = document.createElement('script');
        newScript.textContent = oldScript.textContent;
        oldScript.parentNode.replaceChild(newScript, oldScript);
      });
    });
  </script>
</body>
</html>
