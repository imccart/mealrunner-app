{% set item_id = name | replace(' ', '-') | lower %}
{% set multi_meal = for_text and ',' in for_text %}
<div class="grocery-item {% if checked %}checked{% endif %} {% if multi_meal %}multi-meal{% endif %}"
     id="item-{{ item_id }}">
  <span class="check"
        hx-post="/grocery/toggle/{{ name }}"
        hx-target="#item-{{ item_id }}"
        hx-swap="outerHTML">{% if checked %}&#10003;{% else %}&#9675;{% endif %}</span>
  <span class="name"
        hx-get="/grocery/products/{{ name }}"
        hx-target="#detail-{{ item_id }}"
        hx-swap="innerHTML"
        onclick="setTimeout(function(){document.getElementById('detail-{{ item_id }}').scrollIntoView({behavior:'smooth',block:'nearest'})},100)">{{ name }}{% if multi_meal %} <span class="multi-badge">x{{ for_text.split(',') | length }}</span>{% endif %}</span>
  {% if for_text %}
  <span class="for-text">{{ for_text }}</span>
  {% endif %}
</div>
