<div id="plan-section">
{% if status %}
{% include "partials/status_bar.html" %}
{% endif %}

<div class="card">
  <h2>Meal Plan</h2>
  {% include "partials/plan_table.html" %}
</div>

{% if week and week.start_date %}
<div style="text-align: center; margin-top: 12px; display: flex; justify-content: center; gap: 8px;">
  {% if week.has_empty_days %}
  <button class="btn primary"
          hx-post="/plan/suggest"
          hx-target="#plan-section"
          hx-swap="outerHTML">Fill Empty Days</button>
  {% endif %}
  {% if week.meals and not week.all_on_grocery %}
  <button class="btn"
          hx-post="/plan/all-to-grocery"
          hx-target="#plan-section"
          hx-swap="outerHTML">All to Grocery List</button>
  {% endif %}
</div>
{% endif %}
</div>
