name: E2E Tests

on:
  # Auto-trigger disabled while we sort out the cascading staging-suite
  # timeouts. Run manually from the Actions tab when you want a check.
  # Re-enable by uncommenting the push trigger once the suite is stable.
  # push:
  #   branches: [master, staging]
  workflow_dispatch:

jobs:
  e2e:
    name: Playwright against staging
    runs-on: ubuntu-latest
    # A failed test turns this run RED so regressions are visible. This is NOT
    # a required status check, so a red here does not block pushes or deploys —
    # it surfaces the failure and we decide what to do. To make it actually
    # block, add it as a required status check in branch protection.
    timeout-minutes: 20
    defaults:
      run:
        working-directory: frontend
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install deps
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Wait for staging to be reachable
        run: |
          for i in {1..30}; do
            if curl -fsS "${{ secrets.STAGING_URL }}/health" > /dev/null; then
              echo "staging is up"
              exit 0
            fi
            echo "waiting for staging... ($i/30)"
            sleep 10
          done
          echo "staging never came up"
          exit 1

      - name: Run Playwright tests
        env:
          CI: "true"
          PLAYWRIGHT_BASE_URL: ${{ secrets.STAGING_URL }}
          PLAYWRIGHT_TEST_SECRET: ${{ secrets.PLAYWRIGHT_TEST_SECRET }}
        run: npm run test:e2e

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v5
        with:
          name: playwright-report-${{ github.sha }}
          path: frontend/playwright-report/
          retention-days: 14
