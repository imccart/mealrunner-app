[build]
builder = "nixpacks"
buildCommand = "pip install -e '.[web,kroger,postgres,reconcile]'"

[deploy]
startCommand = "uvicorn mealrunner.web.app:app --host 0.0.0.0 --port ${PORT:-8000}"
healthcheckPath = "/health"
healthcheckTimeout = 60
restartPolicyType = "on_failure"
restartPolicyMaxRetries = 3
